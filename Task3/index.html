<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      color:white;
    }

    .container{
      text-align:center;
      background:rgba(255,255,255,0.1);
      padding:40px;
      border-radius:15px;
      backdrop-filter:blur(10px);
      width:350px;
    }

    h1{
      margin-bottom:20px;
    }

    p{
      margin-bottom:25px;
    }

    .btn{
      display:block;
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      background:white;
      color:#2563eb;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      text-decoration:none;
    }

    .btn:hover{
      background:#ddd;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Welcome</h1>
    <p>Modern Login System</p>

    <a href="login.html" class="btn">Login</a>
    <a href="signup.html" class="btn">Sign Up</a>
  </div>

</body>
</html>
